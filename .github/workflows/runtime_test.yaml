name: Runtime Test
on:
  pull_request_target:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".vscode/**"
      - ".devcontainer/**"
  workflow_call:

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  runtime_test:
    name: Runtime Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            sandbox = false
            ssl-cert-file = /etc/ssl/certs/ca-certificates.crt

      - name: Install dependencies
        run: nix develop .#runtime-test --command bun install --frozen-lockfile

      - name: Build package
        run: nix develop .#runtime-test --command bun run build

      - name: Runtime Test (node)
        run: nix develop .#runtime-test --command bun run runtime-test node

      - name: Runtime Test (bun)
        run: nix develop .#runtime-test --command bun run runtime-test bun

      - name: Runtime Test (deno)
        run: nix develop .#runtime-test --command bun run runtime-test deno
