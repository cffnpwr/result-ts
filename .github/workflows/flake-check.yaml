name: Nix flake check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "**/*.nix"
      - "**/flake.lock"
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true
permissions: {}
jobs:
  flake-check:
    uses: cffnpwr/actions/.github/workflows/flake-check.yaml@b1083d19961177850fd5c4f85c779b8a8400a236
    permissions:
      contents: read
