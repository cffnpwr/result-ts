name: Nix flake check
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - "**/*.nix"
      - "**/flake.lock"
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true
permissions: {}
jobs:
  flake-check:
    uses: cffnpwr/actions/.github/workflows/flake-check.yaml@8e449128ae4f5b5bae3786ea93749991ebe33ae8 # main
    permissions:
      contents: read
