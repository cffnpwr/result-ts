name: Type Check
on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/package.json"
      - "**/bun.lock"
      - "**/tsconfig.json"
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7
      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile
      - name: Run Type Check
        run: nix develop --command bun run typecheck
