name: Type Check
on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/package.json"
      - "**/bun.lock"
      - "**/tsconfig.json"
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@9adf02b41cfdac2632e1c16f0480ff5bf3b05dd6 # v3.21.1
      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile
      - name: Run Type Check
        run: nix develop --command bun run typecheck
