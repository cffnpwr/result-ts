name: Status check
on:
  pull_request_target: # zizmor: ignore[dangerous-triggers]
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  status-check:
    uses: cffnpwr/actions/.github/workflows/status-check.yaml@b1083d19961177850fd5c4f85c779b8a8400a236
    permissions:
      pull-requests: read
      checks: read
      statuses: read
