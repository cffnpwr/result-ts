name: GitHub Actions Lint
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/*"
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number || github.sha }}
  cancel-in-progress: true
permissions: {}
jobs:
  lint:
    uses: cffnpwr/actions/.github/workflows/github-actions-lint.yaml@b1083d19961177850fd5c4f85c779b8a8400a236
    permissions:
      contents: read
