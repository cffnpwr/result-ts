name: Runtime Test
on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/package.json"
      - "**/bun.lock"
      - "**/tsconfig.json"
  workflow_call:
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  runtime_test:
    name: Runtime Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@2a0be2498974c2b6327e19780488744384637d88 # v3.21.7
      - name: Install dependencies
        run: nix develop .#runtime-test --command bun install --frozen-lockfile
      - name: Build package
        run: nix develop .#runtime-test --command bun run build-package
      - name: Runtime Test (node)
        run: nix develop .#runtime-test --command bun run runtime-test node
      - name: Runtime Test (bun)
        run: nix develop .#runtime-test --command bun run runtime-test bun
      - name: Runtime Test (deno)
        run: nix develop .#runtime-test --command bun run runtime-test deno
