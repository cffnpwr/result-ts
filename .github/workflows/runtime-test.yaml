name: Runtime Test
on:
  pull_request:
    branches:
      - main
    paths:
      - "**/*.ts"
      - "**/package.json"
      - "**/bun.lock"
      - "**/tsconfig.json"
  workflow_call:
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true
permissions: {}
jobs:
  runtime_test:
    name: Runtime Test
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          persist-credentials: false
      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@131015bad844610e5e6300f8a143bf625d3e74f4 # v3.17.0
      - name: Install dependencies
        run: nix develop .#runtime-test --command bun install --frozen-lockfile
      - name: Build package
        run: nix develop .#runtime-test --command bun run build-package
      - name: Runtime Test (node)
        run: nix develop .#runtime-test --command bun run runtime-test node
      - name: Runtime Test (bun)
        run: nix develop .#runtime-test --command bun run runtime-test bun
      - name: Runtime Test (deno)
        run: nix develop .#runtime-test --command bun run runtime-test deno
