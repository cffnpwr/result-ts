name: Unit Test
on:
  pull_request_target:
    branches:
      - main
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"
      - ".editorconfig"
      - ".vscode/**"
      - ".devcontainer/**"

concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  unit_test:
    name: Unit Test
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            sandbox = false
            ssl-cert-file = /etc/ssl/certs/ca-certificates.crt

      - name: Install dependencies
        run: nix develop --command bun install --frozen-lockfile

      - name: Run Tests
        run: nix develop --command bun test --coverage --coverage-reporter=lcov --coverage-dir=./coverage

      - name: Run octocov
        uses: k1LoW/octocov-action@v1
        with:
          config: ./.octocov.yaml
